name: Create event
description: Publish a structured event that will appear automatically on the GitHub Pages planner.
title: "Event: "
labels: ["event"]

body:
  - type: markdown
    attributes:
      value: |
        Thanks for creating a new event. The static event planner reads these fields from the issue body.

  - type: input
    id: event_name
    attributes:
      label: Event name
      description: The public event title shown on the site.
      placeholder: "Spring Design Summit"
    validations:
      required: true

  - type: input
    id: event_id
    attributes:
      label: Event ID
      description: A short unique slug used to match RSVPs.
      placeholder: "spring-design-summit-2026"
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - Conference
        - Workshop
        - Meetup
        - Webinar
        - Hackathon
        - Social
        - Internal
        - Other
    validations:
      required: true

  - type: input
    id: start_date
    attributes:
      label: Start date
      description: Use ISO format like "2026-04-21".
      placeholder: "2026-04-21"
    validations:
      required: true

  - type: input
    id: end_date
    attributes:
      label: End date
      description: Use the same format as start date.
      placeholder: "2026-04-21"
    validations:
      required: true

  - type: input
    id: location
    attributes:
      label: Location
      description: City, venue, or meeting URL.
      placeholder: "Brooklyn, NY"
    validations:
      required: true

  - type: input
    id: cover_image
    attributes:
      label: Cover image URL
      description: Public image URL used in cards.
      placeholder: "https://images.unsplash.com/example"
    validations:
      required: true

  - type: input
    id: capacity
    attributes:
      label: Capacity
      description: Optional attendance limit.
      placeholder: "120"

  - type: input
    id: organizer
    attributes:
      label: Organizer
      description: Person, team, or organization.
      placeholder: "Community Team"
    validations:
      required: true

  - type: input
    id: registration_closes
    attributes:
      label: Registration closes
      description: Optional RSVP deadline.
      placeholder: "2026-04-18"

  - type: input
    id: tags
    attributes:
      label: Tags
      description: Comma separated tags.
      placeholder: "design, community, keynote"

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Main event summary.
      placeholder: "Describe what attendees should expect."
    validations:
      required: true

  - type: checkboxes
    id: confirmation
    attributes:
      label: Publication checklist
      options:
        - label: I confirmed the Event ID is unique.
          required: true
