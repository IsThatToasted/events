name: Create event
description: Publish a structured event that will appear automatically on the GitHub Pages planner.
title: "Event: "
labels:
  - event
body:
  - type: markdown
    attributes:
      value: |
        Thanks for creating a new event. The static event planner reads these fields from the issue body, so keep them accurate and consistent.

  - type: input
    id: event_name
    attributes:
      label: Event name
      description: The public event title shown on the site.
      placeholder: Spring Design Summit
    validations:
      required: true

  - type: input
    id: event_id
    attributes:
      label: Event ID
      description: A short unique slug, used to match RSVPs to the event.
      placeholder: spring-design-summit-2026
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - Conference
        - Workshop
        - Meetup
        - Webinar
        - Hackathon
        - Social
        - Internal
        - Other
    validations:
      required: true

  - type: input
    id: start_date
    attributes:
      label: Start date
      description: Use an ISO date or date-time such as 2026-04-21 or 2026-04-21 18:30.
      placeholder: 2026-04-21
    validations:
      required: true

  - type: input
    id: end_date
    attributes:
      label: End date
      description: Use the same format as the start date. Leave it the same for one-day events.
      placeholder: 2026-04-21
    validations:
      required: true

  - type: input
    id: location
    attributes:
      label: Location
      description: City, venue, or meeting URL.
      placeholder: Brooklyn, NY or https://meet.google.com/...
    validations:
      required: true

  - type: input
    id: cover_image
    attributes:
      label: Cover image URL
      description: Public image URL used in cards and modal views.
      placeholder: https://images.unsplash.com/...
    validations:
      required: true

  - type: input
    id: capacity
    attributes:
      label: Capacity
      description: Optional attendance limit.
      placeholder: "120"
    validations:
      required: false

  - type: input
    id: organizer
    attributes:
      label: Organizer
      description: Team, person, or host organization.
      placeholder: Community Team
    validations:
      required: true

  - type: input
    id: registration_closes
    attributes:
      label: Registration closes
      description: Optional last RSVP date.
      placeholder: 2026-04-18
    validations:
      required: false

  - type: input
    id: tags
    attributes:
      label: Tags
      description: Comma-separated tags.
      placeholder: design, community, keynote
    validations:
      required: false

  - type: textarea
    id: description
    attributes:
      label: Description
      description: This becomes the main event summary in the planner.
      placeholder: Share what attendees should expect, what to bring, and why this event matters.
    validations:
      required: true

  - type: checkboxes
    id: confirmation
    attributes:
      label: Publication checklist
      options:
        - label: I confirmed the Event ID is unique and the details are ready to be shown publicly.
          required: true
