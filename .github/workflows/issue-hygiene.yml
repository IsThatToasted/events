name: Event planner issue hygiene

on:
  issues:
    types: [opened, edited, reopened]

permissions:
  issues: write

jobs:
  validate-and-guide:
    runs-on: ubuntu-latest
    steps:
      - name: Add helper comment for malformed event or RSVP issues
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const labels = (issue.labels || []).map(label => label.name);
            const body = issue.body || '';

            const hasHeading = (heading) => new RegExp(`###\\s+${heading}\\s*\\n+`, 'i').test(body);
            const hasBullet = (heading) => new RegExp(`-\\s+${heading}:`, 'i').test(body);
            const isEvent = labels.includes('event');
            const isRsvp = labels.includes('rsvp');

            let message = '';

            if (isEvent) {
              const valid = hasHeading('Event ID') && hasHeading('Start date') && hasHeading('Description');
              if (!valid) {
                message = 'This event issue is missing one or more expected fields. Please reopen the **Create event** YAML issue form and make sure fields such as **Event ID**, **Start date**, and **Description** are present so the planner can parse the event.';
              }
            }

            if (isRsvp) {
              const valid = hasHeading('Event ID') || hasBullet('Event ID');
              if (!valid) {
                message = 'This RSVP could not be matched to an event because the issue body does not include a recognizable **Event ID**. Please edit the issue or submit a new RSVP through the YAML form.';
              }
            }

            if (message) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: message
              });
            }
