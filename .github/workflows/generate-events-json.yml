name: Build events.json

on:
  issues:
    types: [opened, edited, reopened, closed, labeled, unlabeled]
  workflow_dispatch:

permissions:
  contents: write
  issues: read

jobs:
  build-events-json:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build data/events.json from issues
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            function slugify(value) {
              return String(value || '')
                .toLowerCase()
                .trim()
                .replace(/[^a-z0-9]+/g, '-')
                .replace(/^-+|-+$/g, '');
            }

            function escapeRegex(value) {
              return String(value || '').replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            }

            function pickField(markdown, heading) {
              const regex = new RegExp(`^###\\s+${escapeRegex(heading)}\\s*$([\\s\\S]*?)(?=^###\\s+|$)`, 'im');
              const match = String(markdown || '').match(regex);
              if (!match) return '';
              return match[1]
                .replace(/^\\n+/, '')
                .replace(/\\n+$/, '')
                .replace(/^[-*]\\s+/gm, '')
                .trim();
            }

            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'all',
              per_page: 100
            });

            const cleanIssues = issues.filter(issue => !issue.pull_request);

            const events = [];
            const rsvps = [];

            for (const issue of cleanIssues) {
              const labels = (issue.labels || []).map(label =>
                typeof label === 'string' ? label : label.name
              );
              const body = issue.body || '';
              const isClosed = issue.state === 'closed';

              if (labels.includes('event') && !isClosed) {
                const title =
                  pickField(body, 'Event name') ||
                  String(issue.title || '').replace(/^Event:\s*/i, '').trim();

                const slug = slugify(pickField(body, 'Event ID') || title);
                if (!title || !slug) continue;

                events.push({
                  issueNumber: issue.number,
                  issueUrl: issue.html_url,
                  issueCreatedAt: issue.created_at,
                  title,
                  slug,
                  category: pickField(body, 'Category') || 'Other',
                  startDate: pickField(body, 'Start date'),
                  endDate: pickField(body, 'End date') || pickField(body, 'Start date'),
                  location: pickField(body, 'Location') || 'Location TBD',
                  coverImage: pickField(body, 'Cover image URL'),
                  capacity: pickField(body, 'Capacity'),
                  organizer: pickField(body, 'Organizer') || 'Organizer TBD',
                  registrationCloses: pickField(body, 'Registration closes'),
                  tags: String(pickField(body, 'Tags') || '')
                    .split(',')
                    .map(tag => tag.trim())
                    .filter(Boolean),
                  description: pickField(body, 'Description') || 'No description provided yet.'
                });
              }

              if (labels.includes('rsvp') && !isClosed) {
                const eventId = slugify(
                  pickField(body, 'Event ID') ||
                  String(issue.title || '').replace(/^RSVP:\s*/i, '').trim()
                );
                if (!eventId) continue;

                rsvps.push({
                  issueNumber: issue.number,
                  issueUrl: issue.html_url,
                  eventId,
                  attendeeName: pickField(body, 'Attendee name') || 'Guest',
                  attendanceStatus: pickField(body, 'Attendance status') || 'Yes, attending',
                  guestCount: parseInt(pickField(body, 'Guest count') || '1', 10) || 1,
                  notes: pickField(body, 'Notes') || ''
                });
              }
            }

            const output = {
              generatedAt: new Date().toISOString(),
              repo: {
                owner: context.repo.owner,
                name: context.repo.repo
              },
              events,
              rsvps
            };

            fs.mkdirSync(path.join(process.env.GITHUB_WORKSPACE, 'data'), { recursive: true });
            fs.writeFileSync(
              path.join(process.env.GITHUB_WORKSPACE, 'data', 'events.json'),
              JSON.stringify(output, null, 2) + '\n'
            );

      - name: Commit updated events.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/events.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore: update events.json"
          git push
